version: "3.9"

services:
  api:
    image: dotiyalgaurav/fastapi
    container_name: fastapi-api
    ports:
      - "80:8000" 
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:15
    container_name: fastapi-postgres
    env_file:
      - .env
    volumes:
      - postgres-db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

volumes:
  postgres-db: